apiVersion: triggers.tekton.dev/v1beta1
kind: TriggerBinding
metadata:
  name: github-push-binding
spec:
  params:
  - name: git-url
    value: $(body.repository.clone_url)
  - name: git-revision
    value: $(body.ref)
  - name: git-commit-sha
    value: $(body.after)
  - name: git-repo-name
    value: $(body.repository.name)
