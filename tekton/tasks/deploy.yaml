apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: deploy
spec:
  description: Deploy application to OpenShift
  params:
  - name: image
    description: Image reference to deploy
    type: string
  - name: namespace
    description: Target namespace
    type: string
  workspaces:
  - name: source
    description: Workspace containing k8s manifests
  steps:
  - name: patch-deployment
    image: quay.io/openshift/origin-cli:latest
    workingDir: $(workspaces.source.path)
    script: |
      #!/bin/bash
      set -e

      echo "Updating deployment image to image-registry.openshift-image-registry.svc:5000/$(params.namespace)/quarkus-demo:$(params.image)"

      # Apply service and route first (they don't change)
      oc apply -f k8s/service.yaml -n $(params.namespace)
      oc apply -f k8s/route.yaml -n $(params.namespace)

      # Update deployment with correct image using oc set image
      oc apply -f k8s/deployment.yaml -n $(params.namespace)
      oc set image deployment/quarkus-demo \
        quarkus-demo=image-registry.openshift-image-registry.svc:5000/$(params.namespace)/quarkus-demo:$(params.image) \
        -n $(params.namespace)

      echo "Waiting for rollout to complete"
      oc rollout status deployment/quarkus-demo -n $(params.namespace) --timeout=5m

      echo "Deployment completed successfully"
