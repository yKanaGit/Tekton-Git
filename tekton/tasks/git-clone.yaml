apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: git-clone
spec:
  description: Clone a git repository
  params:
  - name: url
    description: Git repository URL
    type: string
  - name: revision
    description: Git revision to checkout (branch, tag, sha)
    type: string
    default: main
  workspaces:
  - name: output
    description: The git repo will be cloned onto this workspace
  steps:
  - name: clone
    image: gcr.io/tekton-releases/github.com/tektoncd/pipeline/cmd/git-init:latest
    script: |
      #!/bin/sh
      set -e
      echo "Cloning $(params.url) at revision $(params.revision)"
      cd $(workspaces.output.path)
      git clone --depth 1 --branch $(params.revision) $(params.url) .
      echo "Clone completed successfully"
