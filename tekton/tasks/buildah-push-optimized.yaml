apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: buildah-push
spec:
  description: Build and push container image using Buildah
  params:
  - name: image
    description: Reference of the image to build (including tag)
    type: string
  - name: dockerfile
    description: Path to the Dockerfile
    type: string
    default: app/src/main/docker/Dockerfile.jvm
  - name: context
    description: Path to the build context
    type: string
    default: app
  workspaces:
  - name: source
    description: Workspace containing the source code
  steps:
  - name: build-and-push
    image: quay.io/buildah/stable:latest
    workingDir: $(workspaces.source.path)
    securityContext:
      privileged: true
    # リソース制限を追加
    resources:
      requests:
        memory: "256Mi"
        cpu: "250m"      # 0.25 CPU コア
      limits:
        memory: "1Gi"
        cpu: "1000m"     # 最大 1 CPU コア
    script: |
      #!/bin/bash
      set -e
      echo "Building image $(params.image)"
      buildah --storage-driver=vfs bud \
        --layers \
        -f $(params.dockerfile) \
        -t $(params.image) \
        $(params.context)

      echo "Pushing image to registry"
      buildah --storage-driver=vfs push \
        --tls-verify=false \
        $(params.image)

      echo "Image pushed successfully: $(params.image)"
