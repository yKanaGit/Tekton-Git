apiVersion: tekton.dev/v1beta1
kind: Pipeline
metadata:
  name: build-deploy-pipeline
spec:
  params:
  - name: git-url
    description: Git repository URL
    type: string
  - name: git-revision
    description: Git revision to checkout
    type: string
    default: main
  - name: image-name
    description: Image name (without tag)
    type: string
  - name: image-tag
    description: Image tag
    type: string
    default: latest
  - name: namespace
    description: Target namespace for deployment
    type: string
  workspaces:
  - name: shared-workspace
    description: Workspace shared between tasks
  tasks:
  - name: fetch-repository
    taskRef:
      name: git-clone
    params:
    - name: url
      value: $(params.git-url)
    - name: revision
      value: $(params.git-revision)
    workspaces:
    - name: output
      workspace: shared-workspace

  - name: build-app
    taskRef:
      name: maven-build
    runAfter:
    - fetch-repository
    params:
    - name: goals
      value: "clean package -DskipTests"
    workspaces:
    - name: source
      workspace: shared-workspace

  - name: build-push-image
    taskRef:
      name: buildah-push
    runAfter:
    - build-app
    params:
    - name: image
      value: "$(params.image-name):$(params.image-tag)"
    - name: dockerfile
      value: "app/src/main/docker/Dockerfile.jvm"
    - name: context
      value: "app"
    workspaces:
    - name: source
      workspace: shared-workspace

  - name: deploy-to-openshift
    taskRef:
      name: deploy
    runAfter:
    - build-push-image
    params:
    - name: image
      value: "$(params.image-tag)"
    - name: namespace
      value: "$(params.namespace)"
    workspaces:
    - name: source
      workspace: shared-workspace
