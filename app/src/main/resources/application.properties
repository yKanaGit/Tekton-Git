# Application
quarkus.application.name=shipper-onboarding-api

# Database
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USER:postgres}
quarkus.datasource.password=${DB_PASSWORD:postgres}
quarkus.datasource.jdbc.url=jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:logisticsdb}

# Hibernate ORM
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.log.sql=false

# Flyway
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=db/migration

# HTTP
quarkus.http.port=8080

# OpenAPI / Swagger UI
quarkus.smallrye-openapi.info-title=Shipper Onboarding API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=物流荷主オンボーディング テンプレート API - 新規荷主・拠点連携を標準化するためのデモアプリケーション
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/q/swagger-ui

# Health Check
quarkus.smallrye-health.ui.always-include=true

# Metrics
quarkus.micrometer.export.prometheus.enabled=true

# Dev Profile
%dev.quarkus.hibernate-orm.log.sql=true
%dev.quarkus.flyway.migrate-at-start=true
%dev.quarkus.log.level=INFO
%dev.quarkus.log.category."com.example.logistics".level=DEBUG

# Production Profile
%prod.quarkus.datasource.username=${DB_USER}
%prod.quarkus.datasource.password=${DB_PASSWORD}
%prod.quarkus.datasource.jdbc.url=jdbc:postgresql://${DB_HOST}:5432/${DB_NAME}
%prod.quarkus.hibernate-orm.database.generation=none
%prod.quarkus.hibernate-orm.log.sql=false
%prod.quarkus.flyway.migrate-at-start=true
%prod.quarkus.log.level=INFO
